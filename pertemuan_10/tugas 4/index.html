<!DOCTYPE html>
<html>
<head>
    <title>Data Praktikan PPW1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<script>
    let jawab = prompt("Apakah anda praktikan PPW1? (iya/tidak)");
    if (jawab.toLowerCase() == "iya") {
        let nama = prompt("Masukkan Nama");
        let nim = prompt("Masukkan NIM");
        let angkatan = prompt("Masukkan Angkatan");
        
        document.write(`
            <h2 class="mb-4">Data Praktikan PPW1</h2>
            <table class="table table-bordered table-striped">
                <tr>
                    <th>Nama</th>
                    <th>NIM</th>
                    <th>Angkatan</th>
                </tr>
                <tr>
                    <td>${nama}</td>
                    <td>${nim}</td>
                    <td>${angkatan}</td>
                </tr>
            </table>
        `);

    } else {
        document.write(`
            <h2 class="text-danger">
                Anda bukan praktikan PPW1, anda tidak boleh masuk!
            </h2>
        `);
    }
</script>
</body>
</html>
