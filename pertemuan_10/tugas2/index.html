<!DOCTYPE html>
<html>
<head>
    <title>Output JavaScript</title>
</head>
<body>
    <h1>Macam-Macam Output JavaScript</h1>
    <p id="hasil"></p>
    <script>
        console.log("Ini output dari console.log()");
        alert("Ini output dari alert()");
        document.write("<h3>Ini output dari document.write()</h3>");
        document.getElementById("hasil").innerHTML =
            "Ini output dari innerHTML";
    </script>
</body>
</html>
