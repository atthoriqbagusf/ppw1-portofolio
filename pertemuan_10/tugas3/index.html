<!DOCTYPE html>
<html>
<head>
    <title>Perbandingan Bilangan</title>
</head>
<body>
<script>
    let bil1 = parseInt(prompt("Masukkan bilangan ke-1"));
    let bil2 = parseInt(prompt("Masukkan bilangan ke-2"));
    if (bil1 > bil2) {
        document.write("BILANGAN KE-1 LEBIH BESAR DARI BILANGAN KE-2");
    } 
    else if (bil2 > bil1) {
        document.write("BILANGAN KE-2 LEBIH BESAR DARI BILANGAN KE-1");
    } 
    else {
        document.write("KEDUA BILANGAN SAMA");
    }
</script>
</body>
</html>
