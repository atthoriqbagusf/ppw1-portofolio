<!DOCTYPE html>
<html>
<head>
    <title>Colspan dan Rowspan</title>
</head>
<body>

<table border="1">
    <tr>
        <th colspan="2">Data Mahasiswa</th>
    </tr>
    <tr>
        <td>Nama</td>
        <td>Andi</td>
    </tr>
    <tr>
        <td rowspan="2">Jurusan</td>
        <td>Informatika</td>
    </tr>
    <tr>
        <td>Sistem Informasi</td>
    </tr>
</table>

</body>
</html>
