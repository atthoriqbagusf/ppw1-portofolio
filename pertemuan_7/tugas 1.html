<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Kartu Profil</title>
<style>
body {
    margin: 0;
    font-family: Arial;
    height: 2000px; 
}

.navbar {
    position: sticky;
    top: 0;
    background: #333;
    color: white;
    padding: 15px;
    z-index: 1000;
}

.card {
    position: relative;
    width: 280px;
    height: 350px;
    background: #f5f5f5;
    margin: 50px auto;
    padding: 20px;
    border-radius: 10px;
}

.badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background: green;
    color: white;
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 12px;
}

.top-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: black;
    color: white;
    padding: 10px 15px;
    border-radius: 5px;
    text-decoration: none;
    z-index: 999;
}
</style>
</head>

<body>

<div class="navbar">My Website</div>

<div class="card">
    <div class="badge">Online 🟢</div>
    <h2>Nama Kamu</h2>
    <p>Mahasiswa / Developer</p>
</div>

<a href="#" class="top-btn">Top ↑</a>

</body>
</html>
