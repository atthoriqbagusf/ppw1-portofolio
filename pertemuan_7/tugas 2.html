<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Landing Page</title>
<style>
body {
    margin: 0;
    font-family: Arial;
}

.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: #333;
    color: white;
}

.hero {
    display: flex;
    padding: 50px;
    align-items: center;
}

.hero-text {
    flex: 1;
}

.hero-img {
    flex: 1;
}

.cards {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    padding: 20px;
}

.card {
    flex: 1 1 200px;
    background: #eee;
    padding: 20px;
    border-radius: 10px;
}

.footer {
    display: flex;
    gap: 20px;
    padding: 20px;
    background: #222;
    color: white;
}

.footer div {
    flex: 1;
}

/* Responsive */
@media (max-width: 768px) {
    .hero {
        flex-direction: column;
    }
    .footer {
        flex-direction: column;
    }
}
</style>
</head>

<body>

<div class="navbar">
    <div>Logo</div>
    <div>Menu</div>
</div>

<div class="hero">
    <div class="hero-text">
        <h1>Welcome</h1>
        <p>Ini landing page sederhana</p>
    </div>
    <div class="hero-img">
        <img src="https://via.placeholder.com/300" width="100%">
    </div>
</div>

<div class="cards">
    <div class="card">Card 1</div>
    <div class="card">Card 2</div>
    <div class="card">Card 3</div>
</div>

<div class="footer">
    <div>Kolom 1</div>
    <div>Kolom 2</div>
    <div>Kolom 3</div>
</div>

</body>
</html>
