<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Animation</title>
<style>

:root {
    --primary: #3498db;
    --secondary: #2ecc71;
    --dark: #333;
}

.btn {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    cursor: pointer;
    transition: all 0.3s ease;
}

.btn1:hover {
    background: var(--primary);
    color: white;
}

.btn2:hover {
    transform: scale(1.1);
}

.btn3:hover {
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.spinner {
    margin: 20px;
    width: 50px;
    height: 50px;
    border: 5px solid #ccc;
    border-top: 5px solid var(--primary);
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% {
        transform: rotate(360deg);
    }
}

.fade {
    opacity: 0;
    animation: fadeIn 2s forwards;
}

@keyframes fadeIn {
    to {
        opacity: 1;
    }
}

.card {
    width: 150px;
    height: 150px;
    background: var(--secondary);
    margin: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: transform 0.6s;
}

.card:hover {
    transform: rotateY(180deg);
}
</style>
</head>
<body>
<h2 class="fade">Animasi Masuk</h2>
<button class="btn btn1">Hover Warna</button>
<button class="btn btn2">Zoom</button>
<button class="btn btn3">Shadow</button>
<div class="spinner"></div>
<div class="card">Hover Me</div>`
</body>
</html>
