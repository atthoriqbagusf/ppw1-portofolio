<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard Nilai</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

  <!-- Profile -->
  <div class="card mb-4 p-3 d-flex flex-row align-items-center">
    <img src="https://via.placeholder.com/80" class="rounded-circle me-3">
    <div>
      <h5>Atthoriq</h5>
      <span class="badge bg-success">Aktif</span>
    </div>
  </div>

  <!-- Statistik -->
  <div class="row text-center mb-4">
    <div class="col-md-4">
      <div class="card p-3">
        📘 Total SKS
        <h4>120</h4>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card p-3">
        ⭐ IPK
        <h4>3.75</h4>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card p-3">
        🎓 Lulus
        <h4>30 MK</h4>
      </div>
    </div>
  </div>

  <!-- Tabel -->
  <div class="table-responsive">
    <table class="table table-bordered">
      <thead class="table-dark">
        <tr>
          <th>No</th>
          <th>Mata Kuliah</th>
          <th>SKS</th>
          <th>Huruf</th>
          <th>Angka</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody>

        <tr>
          <td>1</td>
          <td>Pemrograman</td>
          <td>3</td>
          <td><span class="badge bg-success">A</span></td>
          <td>4.0</td>
          <td><button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#detailModal">Detail</button></td>
        </tr>

        <tr>
          <td>2</td>
          <td>Basis Data</td>
          <td>3</td>
          <td><span class="badge bg-primary">B</span></td>
          <td>3.0</td>
          <td><button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#detailModal">Detail</button></td>
        </tr>

        <tr>
          <td>3</td>
          <td>Algoritma</td>
          <td>3</td>
          <td><span class="badge bg-warning">C</span></td>
          <td>2.0</td>
          <td><button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#detailModal">Detail</button></td>
        </tr>

      </tbody>
    </table>
  </div>

</div>

<!-- Modal -->
<div class="modal fade" id="detailModal">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5>Detail Mata Kuliah</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        Informasi detail mata kuliah ditampilkan di sini.
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
